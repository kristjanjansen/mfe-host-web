<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mf-host-web</title>
    <link rel="modulepreload" href="/vendor/react.js" />
    <link rel="modulepreload" href="/vendor/react-dom-client.js" />
    <link rel="modulepreload" href="/vendor/react-jsx-runtime.js" />
    <link rel="modulepreload" href="/vendor/tanstack-query.js" />
    <link rel="modulepreload" href="/vendor/i18next.js" />
    <script type="importmap">
      {
        "imports": {
          "react": "/vendor/react.js",
          "react-dom/client": "/vendor/react-dom-client.js",
          "react/jsx-runtime": "/vendor/react-jsx-runtime.js",
          "@tanstack/react-query": "/vendor/tanstack-query.js",
          "i18next": "/vendor/i18next.js"
        }
      }
    </script>
    <script>
      // Theme (sync, before paint)
      const theme = localStorage.getItem("theme") ||
        (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);

    </script>
    <style>
      body { margin: 0; }

      :root, :root[data-theme="light"] {
        --bg: #ffffff;
        --fg: #111827;
      }

      :root[data-theme="dark"] {
        --bg: #0f172a;
        --fg: #f1f5f9;
      }

      body {
        background: var(--bg);
        color: var(--fg);
      }

      * { transition: background-color 0.2s ease, color 0.2s ease; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
